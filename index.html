<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Word Generator</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#111111">
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:16px;line-height:1.25}
    h1{font-size:18px;margin:0 0 12px 0}
    .grid{display:grid;grid-template-columns:1fr;gap:10px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    input,button,select{font-size:18px;padding:10px;border:1px solid #ccc;border-radius:12px}
    input{flex:1;min-width:240px}
    button{cursor:pointer}
    small{color:#666}
    #results{white-space:pre; font-size:16px; padding:12px; border:1px solid #ddd; border-radius:14px; min-height:260px; overflow:auto}
    .muted{opacity:.75}
    .pill{display:inline-block;padding:4px 10px;border:1px solid #ddd;border-radius:999px}
    .hint{font-size:13px;color:#666;margin-top:-6px}
    .label{font-size:13px;color:#444;margin:0 0 4px 2px}
  </style>
</head>
<body>

<h1>Word Generator</h1>

<div class="grid">
  <div>
    <div class="label">Letters (use ? as wildcard)</div>
    <div class="row">
      <input id="letters" inputmode="latin" autocomplete="off" autocapitalize="none" spellcheck="false"
        placeholder="e.g., stare??" />
      <button id="clearBtn" type="button">Clear</button>
    </div>
    <div class="hint">“?” matches any single letter. Example: <span class="pill">stare?</span> finds words you can make with stare + one blank.</div>
  </div>

  <div class="row">
    <div style="flex:1;min-width:220px">
      <div class="label">Must contain</div>
      <input id="mustContain" inputmode="latin" autocomplete="off" autocapitalize="none" spellcheck="false"
        placeholder="e.g., ing" />
      <div class="hint">Letters here must appear somewhere in the word (counts matter: <span class="pill">oo</span> requires two O’s).</div>
    </div>

    <div style="flex:1;min-width:220px">
      <div class="label">Starts with</div>
      <input id="startsWith" inputmode="latin" autocomplete="off" autocapitalize="none" spellcheck="false"
        placeholder="e.g., pre" />
    </div>

    <div style="flex:1;min-width:220px">
      <div class="label">Ends with</div>
      <input id="endsWith" inputmode="latin" autocomplete="off" autocapitalize="none" spellcheck="false"
        placeholder="e.g., ed" />
    </div>
  </div>

  <div class="row muted">
    <label class="pill">Min length
      <select id="minLen">
        <option>2</option><option>3</option><option>4</option><option>5</option>
        <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
      </select>
    </label>

    <label class="pill">Sort
      <select id="sortMode">
        <option value="long" selected>Longest first</option>
        <option value="alpha">A→Z</option>
      </select>
    </label>

    <label class="pill">Max results
      <select id="maxOut">
        <option value="2000">2000</option>
        <option value="5000" selected>5000</option>
        <option value="10000">10000</option>
        <option value="999999">all</option>
      </select>
    </label>
  </div>

  <p class="muted" style="margin:0">
    <small id="status">Loading…</small>
  </p>

  <div id="results"></div>
</div>

<script>
/*
  Features added:
  - ? wildcard blanks (each ? can be any letter)
  - must contain (counts matter)
  - starts with / ends with
  - longest-first sorting
  - fast checking with packed letter counts
*/

const DICT_URL = "https://raw.githubusercontent.com/dwyl/english-words/master/words_alpha.txt";

// IndexedDB
const DB_NAME = "WordGenDB";
const STORE = "kv";
const KEY = "words_alpha_v2"; // bumped for this upgraded build

let DICT = [];
let META = [];
let READY = false;

const $letters = document.getElementById("letters");
const $must = document.getElementById("mustContain");
const $starts = document.getElementById("startsWith");
const $ends = document.getElementById("endsWith");
const $results = document.getElementById("results");
const $status  = document.getElementById("status");
const $minLen  = document.getElementById("minLen");
const $sortMode= document.getElementById("sortMode");
const $maxOut  = document.getElementById("maxOut");

document.getElementById("clearBtn").addEventListener("click", () => {
  $letters.value = "";
  $must.value = "";
  $starts.value = "";
  $ends.value = "";
  $results.textContent = "";
  $letters.focus();
});

[$letters,$must,$starts,$ends].forEach(el => el.addEventListener("input", () => READY && run()));
[$minLen,$sortMode,$maxOut].forEach(el => el.addEventListener("change", () => READY && run()));

function normAZ(s){
  return (s || "").toLowerCase().replace(/[^a-z]/g, "");
}
function normLettersWithQ(s){
  return (s || "").toLowerCase().replace(/[^a-z?]/g, "");
}

function openDB(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function idbGet(db, key){
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readonly");
    const st = tx.objectStore(STORE);
    const req = st.get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function idbSet(db, key, val){
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    const st = tx.objectStore(STORE);
    const req = st.put(val, key);
    req.onsuccess = () => resolve(true);
    req.onerror = () => reject(req.error);
  });
}

// Build packed counts for each word (fast checks)
function buildMeta(words){
  const meta = new Array(words.length);
  for (let i=0;i<words.length;i++){
    const w = words[i];
    const counts = new Uint8Array(26);
    let mask = 0;
    for (let j=0;j<w.length;j++){
      const c = w.charCodeAt(j) - 97;
      counts[c]++;
      mask |= (1 << c);
    }
    const packed = [];
    for (let k=0;k<26;k++){
      if (counts[k]) packed.push(k, counts[k]);
    }
    meta[i] = { len: w.length, mask, packed };
  }
  return meta;
}

async function loadDictionary(){
  $status.textContent = "Checking offline dictionary…";
  const db = await openDB();
  let cached = await idbGet(db, KEY);

  if (!cached){
    $status.textContent = "Downloading dictionary (first time only)…";
    const resp = await fetch(DICT_URL, { cache: "no-store" });
    if (!resp.ok) throw new Error("Dictionary download failed.");
    const text = await resp.text();

    const words = text
      .split("\n")
      .map(x => x.trim())
      .filter(w => w && /^[a-z]+$/.test(w))
      .filter(w => w.length >= 2 || w === "a" || w === "i");

    cached = { words };
    await idbSet(db, KEY, cached);
    $status.textContent = "Dictionary saved for offline use ✅";
  } else {
    $status.textContent = "Loaded offline dictionary ✅";
  }

  DICT = cached.words;
  $status.textContent = `Indexing… (${DICT.length.toLocaleString()} words)`;
  META = buildMeta(DICT);

  READY = true;
  $status.textContent = `Ready ✅ (${DICT.length.toLocaleString()} words)`;
}

function buildCounts(str){
  const counts = new Uint8Array(26);
  for (let i=0;i<str.length;i++){
    const idx = str.charCodeAt(i) - 97;
    if (idx >= 0 && idx < 26) counts[idx]++;
  }
  return counts;
}

// Check if word can be formed from rack counts + wildcard count (?)
function canMakeWithWildcards(wordPackedCounts, rackCounts, wild){
  // deficit sum across letters must be <= wild
  let deficit = 0;
  for (let p=0;p<wordPackedCounts.length;p+=2){
    const idx = wordPackedCounts[p];
    const need = wordPackedCounts[p+1];
    const have = rackCounts[idx];
    if (need > have) {
      deficit += (need - have);
      if (deficit > wild) return false;
    }
  }
  return true;
}

// Check mustContain counts (counts matter)
function satisfiesMust(wordPackedCounts, mustCounts){
  // mustCounts is full 26; verify need <= have for each needed letter
  for (let i=0;i<26;i++){
    const need = mustCounts[i];
    if (!need) continue;

    // Find have in packed
    let have = 0;
    for (let p=0;p<wordPackedCounts.length;p+=2){
      if (wordPackedCounts[p] === i){ have = wordPackedCounts[p+1]; break; }
    }
    if (have < need) return false;
  }
  return true;
}

function run(){
  const rackRaw = normLettersWithQ($letters.value);
  if (!rackRaw){
    $results.textContent = "";
    return;
  }

  const starts = normAZ($starts.value);
  const ends = normAZ($ends.value);
  const mustStr = normAZ($must.value);

  const minLen = parseInt($minLen.value, 10);
  const sortMode = $sortMode.value;
  const maxOut = parseInt($maxOut.value, 10);

  const wild = (rackRaw.match(/\?/g) || []).length;
  const rackLetters = rackRaw.replace(/\?/g, "");
  const rackLen = rackRaw.length;

  const rackCounts = buildCounts(rackLetters);
  const mustCounts = buildCounts(mustStr);

  // If must letters exceed possible length, bail early
  const mustTotal = mustStr.length;
  if (mustTotal > rackLen){
    $results.textContent = "none";
    return;
  }

  // Quick mask for no-wildcard mode (fast reject)
  let rackMask = 0;
  for (let i=0;i<26;i++){
    if (rackCounts[i]) rackMask |= (1 << i);
  }

  const out = [];

  for (let i=0;i<DICT.length;i++){
    const w = DICT[i];
    const m = META[i];

    if (m.len > rackLen) continue;
    if (m.len < minLen) continue;

    // starts/ends filter
    if (starts && !w.startsWith(starts)) continue;
    if (ends && !w.endsWith(ends)) continue;

    // must contain filter (counts matter)
    if (mustStr && !satisfiesMust(m.packed, mustCounts)) continue;

    // if no wildcards, reject words that use letters not in rack
    if (wild === 0){
      if ((m.mask & ~rackMask) !== 0) continue;
      // exact count check
      let ok = true;
      for (let p=0;p<m.packed.length;p+=2){
        const idx = m.packed[p];
        const need = m.packed[p+1];
        if (need > rackCounts[idx]) { ok = false; break; }
      }
      if (!ok) continue;
      out.push(w);
    } else {
      // with wildcards, allow deficits up to wild
      if (!canMakeWithWildcards(m.packed, rackCounts, wild)) continue;
      out.push(w);
    }

    if (out.length >= maxOut) break;
  }

  if (out.length === 0){
    $results.textContent = "none";
    return;
  }

  if (sortMode === "alpha"){
    out.sort();
  } else {
    out.sort((a,b) => (b.length - a.length) || (a < b ? -1 : a > b ? 1 : 0));
  }

  $results.textContent = out.join("\n");
}

// Service worker (PWA)
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}

loadDictionary().catch(err => {
  $status.textContent = "Error: " + (err?.message || String(err));
});
</script>

</body>
</html>
