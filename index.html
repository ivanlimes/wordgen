<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WordGen</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0b3a44">

  <style>
    :root{
  --bg:#062a33;
  --surface:#0a3843;
  --surface2:#0d4653;
  --border:#1f7a8c;
  --text:#e9fbff;
  --muted:#b7d9df;
  --shadow: 0 10px 30px rgba(0,0,0,.25);

  --r:14px;
  --gap:12px;

  /* Mobile-friendly sizing */
  --fs:16px;
  --tap:44px; /* minimum comfortable tap height */
}

*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  line-height:1.35;
}

.wrap{
  max-width: 980px;
  margin: 0 auto;

  /* iPhone safe-area padding */
  padding:
    calc(16px + env(safe-area-inset-top))
    calc(16px + env(safe-area-inset-right))
    calc(16px + env(safe-area-inset-bottom))
    calc(16px + env(safe-area-inset-left));

  display:flex;
  flex-direction:column;
  gap: 14px;
}

header{
  display:flex;
  flex-direction:column; /* mobile first */
  gap: 6px;
}

.title{display:flex;flex-direction:column;gap:2px}
h1{margin:0;font-size:18px;letter-spacing:.3px}
.sub{color:var(--muted);font-size:13px}

.card{
  background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
  border:1px solid rgba(31,122,140,.55);
  border-radius: var(--r);
  box-shadow: var(--shadow);
  padding: 14px;
}

/* MOBILE FIRST: 1 column always */
.grid{display:grid;grid-template-columns:1fr;gap:var(--gap)}
.controls{display:grid;grid-template-columns:1fr;gap:var(--gap)}

label{
  display:block;
  font-size:12px;
  color:var(--muted);
  margin: 0 0 6px 2px;
  letter-spacing:.2px;
}

input, select, button{
  width:100%;
  font-size: var(--fs);
  min-height: var(--tap);
  padding: 12px 12px;
  border-radius: 12px;
  border:1px solid rgba(31,122,140,.8);
  background: var(--surface);
  color: var(--text);
  outline: none;
}

input::placeholder{color:rgba(183,217,223,.75)}

input:focus, select:focus{
  border-color: rgba(233,251,255,.85);
}

/* Make rows stack cleanly on phone */
.row{
  display:flex;
  flex-direction:column;
  gap:10px;
  align-items:stretch;
}

.btn{
  background: var(--surface2);
  cursor:pointer;
  font-weight:600;
  letter-spacing:.2px;
}
.btn:active{transform: translateY(1px)}

.hint{
  margin-top: 8px;
  font-size: 13px;
  color: var(--muted);
}

.pill{
  display:inline-block;
  padding: 2px 10px;
  border-radius: 999px;
  border:1px solid rgba(31,122,140,.8);
  background: rgba(0,0,0,.12);
  color: var(--text);
  font-size: 12px;
  vertical-align: middle;
}

.status{font-size:13px;color:var(--muted)}

#results{
  white-space: pre-wrap;     /* IMPORTANT: wraps on phone, no horizontal scroll */
  word-break: break-word;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  font-size: 14px;
  line-height: 1.5;
  padding: 12px;
  border-radius: 12px;
  border:1px solid rgba(31,122,140,.8);
  background: rgba(0,0,0,.18);
  min-height: 280px;
  max-height: 55vh;          /* keeps it from becoming a mile tall */
  overflow:auto;
}

/* TABLET/DESKTOP UPGRADES */
@media (min-width: 720px){
  header{
    flex-direction:row;
    align-items:flex-end;
    justify-content:space-between;
  }

  .row{
    flex-direction:row;
    flex-wrap:wrap;
    align-items:center;
  }

  .grid.cols-2{grid-template-columns: 1fr 1fr}
  .grid.cols-3{grid-template-columns: 1fr 1fr 1fr}
  .controls{grid-template-columns: 1fr 1fr 1fr}
}

/* Small phone tweak */
@media (max-width: 380px){
  h1{font-size:17px}
  .sub{font-size:12px}
  #results{font-size:13px}
}
  </style>
</head>
<body>

<div class="wrap">

  <header>
    <div class="title">
      <h1>WordGen</h1>
      <div class="sub">Use ? as a blank. Filter with must-contain, starts-with, ends-with.</div>
    </div>
    <div class="status" id="status">Loading…</div>
  </header>

  <div class="card">
    <div class="grid cols-2">
      <div>
        <label>Letters (use ? as wildcard)</label>
        <div class="row">
          <input id="letters" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="stare??" />
          <button class="btn" id="clearBtn" type="button" style="width:auto;min-width:110px">Clear</button>
        </div>
        <div class="hint">Example: <span class="pill">stare?</span> = stare + one blank letter.</div>
      </div>

      <div class="grid cols-3" style="align-content:start">
        <div>
          <label>Must contain</label>
          <input id="mustContain" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="ing" />
        </div>
        <div>
          <label>Starts with</label>
          <input id="startsWith" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="pre" />
        </div>
        <div>
          <label>Ends with</label>
          <input id="endsWith" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="ed" />
        </div>
      </div>
    </div>

    <div class="controls" style="margin-top:14px">
      <div>
        <label>Min length</label>
        <select id="minLen">
          <option>2</option><option>3</option><option>4</option><option>5</option>
          <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
        </select>
      </div>

      <div>
        <label>Sort</label>
        <select id="sortMode">
          <option value="long" selected>Longest first</option>
          <option value="alpha">A→Z</option>
        </select>
      </div>

      <div>
        <label>Max results</label>
        <select id="maxOut">
          <option value="2000">2000</option>
          <option value="5000" selected>5000</option>
          <option value="10000">10000</option>
          <option value="999999">all</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <div id="results"></div>
  </div>

</div>

<script>
const DICT_URL = "https://raw.githubusercontent.com/dwyl/english-words/master/words_alpha.txt";

// IndexedDB
const DB_NAME = "WordGenDB";
const STORE = "kv";
const KEY = "words_alpha_v4"; // bump to avoid old cached key collisions

let DICT = [];
let META = [];
let READY = false;

const $letters = document.getElementById("letters");
const $must = document.getElementById("mustContain");
const $starts = document.getElementById("startsWith");
const $ends = document.getElementById("endsWith");
const $results = document.getElementById("results");
const $status  = document.getElementById("status");
const $minLen  = document.getElementById("minLen");
const $sortMode= document.getElementById("sortMode");
const $maxOut  = document.getElementById("maxOut");

document.getElementById("clearBtn").addEventListener("click", () => {
  $letters.value = "";
  $must.value = "";
  $starts.value = "";
  $ends.value = "";
  $results.textContent = "";
  $letters.focus();
});

[$letters,$must,$starts,$ends].forEach(el => el.addEventListener("input", () => READY && run()));
[$minLen,$sortMode,$maxOut].forEach(el => el.addEventListener("change", () => READY && run()));

function normAZ(s){ return (s || "").toLowerCase().replace(/[^a-z]/g, ""); }
function normLettersWithQ(s){ return (s || "").toLowerCase().replace(/[^a-z?]/g, ""); }

function openDB(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function idbGet(db, key){
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readonly");
    const st = tx.objectStore(STORE);
    const req = st.get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function idbSet(db, key, val){
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    const st = tx.objectStore(STORE);
    const req = st.put(val, key);
    req.onsuccess = () => resolve(true);
    req.onerror = () => reject(req.error);
  });
}

function buildMeta(words){
  const meta = new Array(words.length);
  for (let i=0;i<words.length;i++){
    const w = words[i];
    const counts = new Uint8Array(26);
    let mask = 0;
    for (let j=0;j<w.length;j++){
      const c = w.charCodeAt(j) - 97;
      counts[c]++;
      mask |= (1 << c);
    }
    const packed = [];
    for (let k=0;k<26;k++){
      if (counts[k]) packed.push(k, counts[k]);
    }
    meta[i] = { len: w.length, mask, packed };
  }
  return meta;
}

async function loadDictionary(){
  $status.textContent = "Checking offline dictionary…";
  const db = await openDB();
  let cached = await idbGet(db, KEY);

  if (!cached){
    $status.textContent = "Downloading dictionary (first time only)…";
    const resp = await fetch(DICT_URL, { cache: "no-store" });
    if (!resp.ok) throw new Error("Dictionary download failed.");
    const text = await resp.text();

    const words = text
      .split("\n")
      .map(x => x.trim())
      .filter(w => w && /^[a-z]+$/.test(w))
      .filter(w => w.length >= 2 || w === "a" || w === "i");

    cached = { words };
    await idbSet(db, KEY, cached);
    $status.textContent = "Dictionary saved ✅";
  } else {
    $status.textContent = "Loaded offline dictionary ✅";
  }

  DICT = cached.words;
  $status.textContent = `Indexing… (${DICT.length.toLocaleString()} words)`;
  META = buildMeta(DICT);

  READY = true;
  $status.textContent = `Ready ✅ (${DICT.length.toLocaleString()} words)`;
}

function buildCounts(str){
  const counts = new Uint8Array(26);
  for (let i=0;i<str.length;i++){
    const idx = str.charCodeAt(i) - 97;
    if (idx >= 0 && idx < 26) counts[idx]++;
  }
  return counts;
}

function canMakeWithWildcards(wordPackedCounts, rackCounts, wild){
  let deficit = 0;
  for (let p=0;p<wordPackedCounts.length;p+=2){
    const idx = wordPackedCounts[p];
    const need = wordPackedCounts[p+1];
    const have = rackCounts[idx];
    if (need > have) {
      deficit += (need - have);
      if (deficit > wild) return false;
    }
  }
  return true;
}

function satisfiesMust(wordPackedCounts, mustCounts){
  for (let i=0;i<26;i++){
    const need = mustCounts[i];
    if (!need) continue;
    let have = 0;
    for (let p=0;p<wordPackedCounts.length;p+=2){
      if (wordPackedCounts[p] === i){ have = wordPackedCounts[p+1]; break; }
    }
    if (have < need) return false;
  }
  return true;
}

function run(){
  const rackRaw = normLettersWithQ($letters.value);
  if (!rackRaw){
    $results.textContent = "";
    return;
  }

  const starts = normAZ($starts.value);
  const ends = normAZ($ends.value);
  const mustStr = normAZ($must.value);

  const minLen = parseInt($minLen.value, 10);
  const sortMode = $sortMode.value;
  const maxOut = parseInt($maxOut.value, 10);

  const wild = (rackRaw.match(/\?/g) || []).length;
  const rackLetters = rackRaw.replace(/\?/g, "");
  const rackLen = rackRaw.length;

  const rackCounts = buildCounts(rackLetters);
  const mustCounts = buildCounts(mustStr);

  if (mustStr.length > rackLen){
    $results.textContent = "none";
    return;
  }

  let rackMask = 0;
  for (let i=0;i<26;i++){
    if (rackCounts[i]) rackMask |= (1 << i);
  }

  const out = [];
  for (let i=0;i<DICT.length;i++){
    const w = DICT[i];
    const m = META[i];

    if (m.len > rackLen) continue;
    if (m.len < minLen) continue;

    if (starts && !w.startsWith(starts)) continue;
    if (ends && !w.endsWith(ends)) continue;
    if (mustStr && !satisfiesMust(m.packed, mustCounts)) continue;

    if (wild === 0){
      if ((m.mask & ~rackMask) !== 0) continue;
      let ok = true;
      for (let p=0;p<m.packed.length;p+=2){
        const idx = m.packed[p];
        const need = m.packed[p+1];
        if (need > rackCounts[idx]) { ok = false; break; }
      }
      if (!ok) continue;
      out.push(w);
    } else {
      if (!canMakeWithWildcards(m.packed, rackCounts, wild)) continue;
      out.push(w);
    }

    if (out.length >= maxOut) break;
  }

  if (out.length === 0){
    $results.textContent = "none";
    return;
  }

  if (sortMode === "alpha"){
    out.sort();
  } else {
    out.sort((a,b) => (b.length - a.length) || (a < b ? -1 : a > b ? 1 : 0));
  }

  $results.textContent = out.join("\n");
}

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}

loadDictionary().catch(err => {
  $status.textContent = "Error: " + (err?.message || String(err));
});
</script>

</body>
</html>
