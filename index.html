<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WordGen</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0b3a44">

  <style>
    :root{
      --bg:#062a33; --surface:#0a3843; --surface2:#0d4653; --border:#1f7a8c;
      --text:#e9fbff; --muted:#b7d9df; --shadow:0 10px 30px rgba(0,0,0,.25);
      --r:14px; --gap:12px; --tap:44px;
    }
    *{box-sizing:border-box}
    html{-webkit-text-size-adjust:100%}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;line-height:1.35}
    .wrap{max-width:980px;margin:0 auto;padding:calc(16px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right)) calc(16px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left));display:flex;flex-direction:column;gap:14px}
    header{display:flex;flex-direction:column;gap:6px}
    @media (min-width:720px){header{flex-direction:row;align-items:flex-end;justify-content:space-between}}
    .title{display:flex;flex-direction:column;gap:2px}
    h1{margin:0;font-size:18px;letter-spacing:.3px}
    .sub{color:var(--muted);font-size:13px}
    .card{background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));border:1px solid rgba(31,122,140,.55);border-radius:var(--r);box-shadow:var(--shadow);padding:14px}
    .grid{display:grid;grid-template-columns:1fr;gap:var(--gap)}
    .controls{display:grid;grid-template-columns:1fr;gap:var(--gap)}
    @media (min-width:720px){.grid.cols-2{grid-template-columns:1fr 1fr}.grid.cols-3{grid-template-columns:1fr 1fr 1fr}.controls{grid-template-columns:1fr 1fr 1fr}}
    label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px 2px;letter-spacing:.2px}
    input,select,button{width:100%;font-size:16px;min-height:var(--tap);padding:12px 12px;border-radius:12px;border:1px solid rgba(31,122,140,.8);background:var(--surface);color:var(--text);outline:none}
    input::placeholder{color:rgba(183,217,223,.75)}
    input:focus,select:focus{border-color:rgba(233,251,255,.85)}
    .row{display:flex;flex-direction:column;gap:10px;align-items:stretch}
    @media (min-width:720px){.row{flex-direction:row;flex-wrap:wrap;align-items:center}}
    .btn{background:var(--surface2);cursor:pointer;font-weight:600;letter-spacing:.2px;width:auto;min-width:110px}
    .btn:active{transform:translateY(1px)}
    .hint{margin-top:8px;font-size:13px;color:var(--muted)}
    .pill{display:inline-block;padding:2px 10px;border-radius:999px;border:1px solid rgba(31,122,140,.8);background:rgba(0,0,0,.12);color:var(--text);font-size:12px;vertical-align:middle}
    .status{font-size:13px;color:var(--muted)}
    #results{white-space:pre-wrap;word-break:break-word;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;font-size:14px;line-height:1.5;padding:12px;border-radius:12px;border:1px solid rgba(31,122,140,.8);background:rgba(0,0,0,.18);min-height:280px;max-height:55vh;overflow:auto}
    .mini{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:10px;color:var(--muted);font-size:13px}
    .checkrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .checkrow input[type="checkbox"]{width:auto;min-height:auto;height:18px;transform:translateY(1px);accent-color:var(--border)}
  </style>
</head>

<body>
<div class="wrap">

  <header>
    <div class="title">
      <h1>WordGen</h1>
      <div class="sub">Constraints can add letters to the pool (optional rack).</div>
    </div>
    <div class="status" id="status">Loading…</div>
  </header>

  <div class="card">
    <div class="grid cols-2">

      <div>
        <label>Letters (optional rack; use ? as blanks)</label>
        <div class="row">
          <input id="letters" inputmode="text" autocomplete="off" autocapitalize="none" spellcheck="false"
                 placeholder="stare??" />
          <button class="btn" id="clearBtn" type="button">Clear</button>
        </div>
        <div class="hint">
          This field is optional. Letters from <span class="pill">must/starts/ends/pattern</span> are automatically added to the pool.
        </div>
      </div>

      <div class="grid cols-3" style="align-content:start">
        <div>
          <label>Must contain</label>
          <input id="mustContain" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="ing" />
        </div>
        <div>
          <label>Starts with</label>
          <input id="startsWith" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="pre" />
        </div>
        <div>
          <label>Ends with</label>
          <input id="endsWith" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="ed" />
        </div>
      </div>

    </div>

    <div class="grid cols-3" style="margin-top:14px">
      <div>
        <label>Pattern (positional; ? unknown)</label>
        <input id="pattern" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="??a??e" />
        <div class="hint">Fixed letters in the pattern are added to the pool automatically.</div>
      </div>

      <div>
        <label>Exclude letters (must NOT contain)</label>
        <input id="exclude" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="xyz" />
      </div>

      <div>
        <label>Length controls</label>
        <div class="grid" style="grid-template-columns:1fr 1fr;gap:10px">
          <input id="minLen" inputmode="numeric" placeholder="Min" />
          <input id="maxLen" inputmode="numeric" placeholder="Max" />
        </div>
        <div class="mini checkrow">
          <label style="margin:0;display:flex;gap:8px;align-items:center">
            <input id="exactLenToggle" type="checkbox">
            Exact length (use Min only)
          </label>
        </div>
      </div>
    </div>

    <div class="controls" style="margin-top:14px">
      <div>
        <label>Sort</label>
        <select id="sortMode">
          <option value="score" selected>Score (Scrabble)</option>
          <option value="long">Longest first</option>
          <option value="alpha">A→Z</option>
        </select>
      </div>

      <div>
        <label>Max results</label>
        <select id="maxOut">
          <option value="2000">2000</option>
          <option value="5000" selected>5000</option>
          <option value="10000">10000</option>
          <option value="999999">all</option>
        </select>
      </div>

      <div>
        <label>Output</label>
        <select id="outMode">
          <option value="pretty" selected>word — len — score</option>
          <option value="words">words only</option>
        </select>
      </div>
    </div>

    <div class="mini" id="metaLine"></div>
  </div>

  <div class="card">
    <div id="results"></div>
  </div>

</div>

<script>
const DICT_URL = "https://raw.githubusercontent.com/dwyl/english-words/master/words_alpha.txt";

// IndexedDB
const DB_NAME = "WordGenDB";
const STORE = "kv";
const KEY = "words_alpha_v6"; // bump for this behavior change

const SETTINGS_KEY = "wordgen_settings_v3";

let DICT = [];
let META = [];
let READY = false;

// Scrabble letter points
const PTS = {
  a:1,b:3,c:3,d:2,e:1,f:4,g:2,h:4,i:1,j:8,k:5,l:1,m:3,n:1,o:1,p:3,q:10,r:1,s:1,t:1,u:1,v:4,w:4,x:8,y:4,z:10
};

const $letters = document.getElementById("letters");
const $must = document.getElementById("mustContain");
const $starts = document.getElementById("startsWith");
const $ends = document.getElementById("endsWith");
const $pattern = document.getElementById("pattern");
const $exclude = document.getElementById("exclude");
const $minLen = document.getElementById("minLen");
const $maxLen = document.getElementById("maxLen");
const $exactToggle = document.getElementById("exactLenToggle");
const $sortMode = document.getElementById("sortMode");
const $maxOut = document.getElementById("maxOut");
const $outMode = document.getElementById("outMode");
const $results = document.getElementById("results");
const $status = document.getElementById("status");
const $metaLine = document.getElementById("metaLine");

document.getElementById("clearBtn").addEventListener("click", () => {
  $letters.value = "";
  $must.value = "";
  $starts.value = "";
  $ends.value = "";
  $pattern.value = "";
  $exclude.value = "";
  $minLen.value = "";
  $maxLen.value = "";
  $exactToggle.checked = false;
  $sortMode.value = "score";
  $maxOut.value = "5000";
  $outMode.value = "pretty";
  $results.textContent = "";
  saveSettings();
  $letters.focus();
});

[
  $letters,$must,$starts,$ends,$pattern,$exclude,
  $minLen,$maxLen,$exactToggle,$sortMode,$maxOut,$outMode
].forEach(el => {
  el.addEventListener(el.type === "checkbox" ? "change" : "input", () => {
    if (!READY) return;
    saveSettings();
    run();
  });
});

// normalization
function normAZ(s){ return (s || "").toLowerCase().replace(/[^a-z]/g, ""); }
function normLettersWithQ(s){ return (s || "").toLowerCase().replace(/[^a-z?]/g, ""); }
function normPattern(s){ return (s || "").toLowerCase().replace(/[^a-z?]/g, ""); }

// settings
function saveSettings(){
  const payload = {
    letters:$letters.value, must:$must.value, starts:$starts.value, ends:$ends.value,
    pattern:$pattern.value, exclude:$exclude.value,
    minLen:$minLen.value, maxLen:$maxLen.value, exact:$exactToggle.checked,
    sort:$sortMode.value, maxOut:$maxOut.value, outMode:$outMode.value
  };
  try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(payload)); }catch{}
}
function loadSettings(){
  try{
    const raw = localStorage.getItem(SETTINGS_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    if (!s || typeof s !== "object") return;

    $letters.value = s.letters ?? "";
    $must.value = s.must ?? "";
    $starts.value = s.starts ?? "";
    $ends.value = s.ends ?? "";
    $pattern.value = s.pattern ?? "";
    $exclude.value = s.exclude ?? "";
    $minLen.value = s.minLen ?? "";
    $maxLen.value = s.maxLen ?? "";
    $exactToggle.checked = !!s.exact;
    $sortMode.value = s.sort ?? "score";
    $maxOut.value = s.maxOut ?? "5000";
    $outMode.value = s.outMode ?? "pretty";
  }catch{}
}

// IndexedDB helpers
function openDB(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function idbGet(db, key){
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readonly");
    const st = tx.objectStore(STORE);
    const req = st.get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function idbSet(db, key, val){
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    const st = tx.objectStore(STORE);
    const req = st.put(val, key);
    req.onsuccess = () => resolve(true);
    req.onerror = () => reject(req.error);
  });
}

// Build meta: counts + mask + base score
function buildMeta(words){
  const meta = new Array(words.length);
  for (let i=0;i<words.length;i++){
    const w = words[i];
    const counts = new Uint8Array(26);
    let mask = 0;
    let score = 0;
    for (let j=0;j<w.length;j++){
      const c = w.charCodeAt(j) - 97;
      counts[c]++;
      mask |= (1 << c);
      score += PTS[w[j]] || 0;
    }
    const packed = [];
    for (let k=0;k<26;k++){
      if (counts[k]) packed.push(k, counts[k]);
    }
    meta[i] = { len:w.length, mask, packed, score };
  }
  return meta;
}

async function loadDictionary(){
  $status.textContent = "Checking offline dictionary…";
  const db = await openDB();
  let cached = await idbGet(db, KEY);

  if (!cached){
    $status.textContent = "Downloading dictionary (first time only)…";
    const resp = await fetch(DICT_URL, { cache: "no-store" });
    if (!resp.ok) throw new Error("Dictionary download failed.");
    const text = await resp.text();

    const words = text
      .split("\n")
      .map(x => x.trim())
      .filter(w => w && /^[a-z]+$/.test(w))
      .filter(w => w.length >= 2 || w === "a" || w === "i");

    cached = { words };
    await idbSet(db, KEY, cached);
    $status.textContent = "Dictionary saved ✅";
  } else {
    $status.textContent = "Loaded offline dictionary ✅";
  }

  DICT = cached.words;
  $status.textContent = `Indexing… (${DICT.length.toLocaleString()} words)`;
  META = buildMeta(DICT);

  READY = true;
  $status.textContent = `Ready ✅ (${DICT.length.toLocaleString()} words)`;
}

function buildCounts(str){
  const counts = new Uint8Array(26);
  for (let i=0;i<str.length;i++){
    const idx = str.charCodeAt(i) - 97;
    if (idx >= 0 && idx < 26) counts[idx]++;
  }
  return counts;
}

function deficitsPoints(wordPacked, poolCounts){
  const deficits = [];
  for (let p=0;p<wordPacked.length;p+=2){
    const idx = wordPacked[p];
    const need = wordPacked[p+1];
    const have = poolCounts[idx];
    if (need > have){
      const ch = String.fromCharCode(97 + idx);
      const pts = PTS[ch] || 0;
      const times = need - have;
      for (let t=0;t<times;t++) deficits.push(pts);
    }
  }
  return deficits;
}

// uses POOL counts (which now includes constraint letters) + wild blanks
function canMakeAndScore(meta, poolCounts, wild){
  if (wild === 0){
    for (let p=0;p<meta.packed.length;p+=2){
      const idx = meta.packed[p];
      const need = meta.packed[p+1];
      if (need > poolCounts[idx]) return null;
    }
    return { score: meta.score, blanksUsed: 0 };
  }

  const deficitPts = deficitsPoints(meta.packed, poolCounts);
  const blanksUsed = deficitPts.length;
  if (blanksUsed > wild) return null;

  // blanks score 0, so subtract points for letters covered by blanks
  const scoreWithBlanks = meta.score - deficitPts.reduce((a,b)=>a+b,0);
  return { score: scoreWithBlanks, blanksUsed };
}

function matchesPattern(word, pattern){
  if (!pattern) return true;
  if (word.length !== pattern.length) return false;
  for (let i=0;i<pattern.length;i++){
    const p = pattern[i];
    if (p === "?") continue;
    if (word[i] !== p) return false;
  }
  return true;
}

function satisfiesMust(wordPacked, mustCounts){
  for (let i=0;i<26;i++){
    const need = mustCounts[i];
    if (!need) continue;
    let have = 0;
    for (let p=0;p<wordPacked.length;p+=2){
      if (wordPacked[p] === i){ have = wordPacked[p+1]; break; }
    }
    if (have < need) return false;
  }
  return true;
}

function hasExcluded(wordPacked, excludeCounts){
  for (let i=0;i<26;i++){
    if (!excludeCounts[i]) continue;
    for (let p=0;p<wordPacked.length;p+=2){
      if (wordPacked[p] === i) return true;
    }
  }
  return false;
}

function parseLen(val, fallback){
  const n = parseInt(val, 10);
  return Number.isFinite(n) && n > 0 ? n : fallback;
}

/* NEW: build the available pool by ADDING constraint letters */
function buildPoolCounts(rackRaw, mustStr, starts, ends, pattern){
  const rackLetters = rackRaw.replace(/\?/g, "");
  let pool = rackLetters + mustStr + starts + ends;

  // Add fixed letters from pattern (non-?)
  if (pattern){
    pool += pattern.replace(/\?/g, "");
  }

  return buildCounts(pool);
}

function run(){
  const rackRaw = normLettersWithQ($letters.value); // optional now
  const starts = normAZ($starts.value);
  const ends = normAZ($ends.value);
  const mustStr = normAZ($must.value);
  const pattern = normPattern($pattern.value);
  const excludeStr = normAZ($exclude.value);

  // If EVERYTHING is empty, show nothing
  if (!rackRaw && !starts && !ends && !mustStr && !pattern){
    $results.textContent = "";
    $metaLine.textContent = "";
    return;
  }

  const wild = (rackRaw.match(/\?/g) || []).length;

  const exact = $exactToggle.checked;
  const minLen = parseLen($minLen.value, 2);
  const maxLen = exact ? minLen : parseLen($maxLen.value, 99);

  const sortMode = $sortMode.value;
  const maxOut = parseInt($maxOut.value, 10) || 5000;
  const outMode = $outMode.value;

  // pool counts now includes constraints letters
  const poolCounts = buildPoolCounts(rackRaw, mustStr, starts, ends, pattern);

  // Determine pool length (hard cap) = total letters in pool + wild
  const poolLen = (rackRaw.replace(/\?/g,"").length + mustStr.length + starts.length + ends.length + (pattern ? pattern.replace(/\?/g,"").length : 0)) + wild;

  // Effective max length can't exceed poolLen
  const effectiveMax = Math.min(maxLen, poolLen);

  const mustCounts = buildCounts(mustStr);
  const excludeCounts = buildCounts(excludeStr);

  // Quick mask (letters that exist in poolCounts)
  let poolMask = 0;
  for (let i=0;i<26;i++) if (poolCounts[i]) poolMask |= (1 << i);

  const out = [];

  for (let i=0;i<DICT.length;i++){
    const w = DICT[i];
    const m = META[i];

    // length filters
    if (m.len < minLen) continue;
    if (m.len > effectiveMax) continue;

    // prefix/suffix
    if (starts && !w.startsWith(starts)) continue;
    if (ends && !w.endsWith(ends)) continue;

    // pattern
    if (pattern && !matchesPattern(w, pattern)) continue;

    // must contain
    if (mustStr && !satisfiesMust(m.packed, mustCounts)) continue;

    // exclude
    if (excludeStr && hasExcluded(m.packed, excludeCounts)) continue;

    // if no wildcards, reject words containing letters not in pool at all
    if (wild === 0 && ((m.mask & ~poolMask) !== 0)) continue;

    // pool feasibility + scoring
    const scored = canMakeAndScore(m, poolCounts, wild);
    if (!scored) continue;

    out.push({ word:w, len:m.len, score:scored.score, blanksUsed:scored.blanksUsed });

    if (out.length >= maxOut) break;
  }

  if (out.length === 0){
    $results.textContent = "none";
    $metaLine.textContent = "";
    return;
  }

  // sort
  if (sortMode === "alpha"){
    out.sort((a,b)=>a.word.localeCompare(b.word));
  } else if (sortMode === "long"){
    out.sort((a,b)=>(b.len-a.len)||a.word.localeCompare(b.word));
  } else {
    out.sort((a,b)=>(b.score-a.score)||(b.len-a.len)||a.word.localeCompare(b.word));
  }

  // output
  if (outMode === "words"){
    $results.textContent = out.map(x=>x.word).join("\n");
  } else {
    $results.textContent = out.map(x=>{
      const blankTag = x.blanksUsed ? ` — blanks:${x.blanksUsed}` : "";
      return `${x.word} — len:${x.len} — score:${x.score}${blankTag}`;
    }).join("\n");
  }

  // meta line
  const parts = [];
  parts.push(`<span class="pill">${out.length.toLocaleString()} results</span>`);
  parts.push(`<span class="pill">pool:${poolLen} (?:${wild})</span>`);
  if (pattern) parts.push(`<span class="pill">pattern:${pattern}</span>`);
  if (starts) parts.push(`<span class="pill">starts:${starts}</span>`);
  if (ends) parts.push(`<span class="pill">ends:${ends}</span>`);
  if (mustStr) parts.push(`<span class="pill">must:${mustStr}</span>`);
  if (excludeStr) parts.push(`<span class="pill">exclude:${excludeStr}</span>`);
  parts.push(`<span class="pill">len:${minLen}-${effectiveMax}${exact ? " (exact)" : ""}</span>`);
  $metaLine.innerHTML = parts.join(" ");
}

// PWA
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}

// boot
loadSettings();
loadDictionary()
  .then(() => { run(); })
  .catch(err => { $status.textContent = "Error: " + (err?.message || String(err)); });
</script>
</body>
</html>
